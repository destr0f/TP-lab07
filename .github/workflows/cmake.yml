name: CMake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_Linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure
        run: cmake -S . -B _build -DBUILD_TESTS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build _build

      - name: Test
        run: cmake --build _build --target test -- ARGS=--verbose
