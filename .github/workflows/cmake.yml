name: CMake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_Linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/_build -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_install

      - name: Build
        run: cmake --build ${{ github.workspace }}/_build

      - name: Install
        run: cmake --build ${{ github.workspace }}/_build --target install

      - name: Run example1
        run: ${{ github.workspace }}/_build/example1

      - name: Run example2
        run: |
          ${{ github.workspace }}/_build/example2
          cat log.txt
